services:
  postgres-ff:
    image: postgres:18-alpine
    container_name: ff-service-postgres
    environment:
      POSTGRES_DB: ${FF_SERVICE_DB}
      POSTGRES_USER: ${FF_SERVICE_DB_USER}
      POSTGRES_PASSWORD: ${FF_SERVICE_DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: UTC+3
    ports:
      - "5432:5432"
    volumes:
      - ff_service_pgdata:/var/lib/postgresql/data/pgdata
    shm_size: "256m"
    restart: unless-stopped
    networks:
      - redflag-network

  postgres-auth:
    image: postgres:latest
    container_name: authdatabase
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${AUTH_SERVICE_DB}
      POSTGRES_USER: ${AUTH_SERVICE_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_SERVICE_DB_PASSWORD}
    volumes:
      - postgres-auth-data:/var/lib/postgresql
    networks:
      - redflag-network

  redis-auth:
    image: redis:7-alpine
    container_name: authredis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - redflag-network

  kafka:
    image: apache/kafka:3.7.1
    container_name: auth-kafka
    hostname: kafka
    ports:
      - "9094:9094"
    volumes:
      - kafka_data:/var/lib/kafka/data
      - ./init-kafka.sh:/usr/local/bin/init-kafka.sh
    restart: unless-stopped
    entrypoint: ["/bin/bash", "/usr/local/bin/init-kafka.sh"]
    networks:
      - redflag-network
    environment:
      # Отключаем SASL для простоты (или настраиваем правильно)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: auth-kafka-ui
    ports:
      - "8082:8080"
    depends_on:
      - kafka
    environment:
      - KAFKA_CLUSTERS_0_NAME=RedFlag-Cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    networks:
      - redflag-network

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8081:8080"
    environment:
      MICRONAUT_ENVIRONMENTS: dev
      DATASOURCES_DEFAULT_URL: jdbc:postgresql://postgres-auth:5432/${AUTH_SERVICE_DB}
      DATASOURCES_DEFAULT_USERNAME: ${AUTH_SERVICE_DB_USER}
      DATASOURCES_DEFAULT_PASSWORD: ${AUTH_SERVICE_DB_PASSWORD}
      REDIS_URI: redis://redis-auth:6379
      REDFLAG_SERVICES_FF_SERVICE_URL: http://ff-service:8080
      # Добавляем Kafka конфигурацию
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # Если нужна SASL аутентификация:
      # KAFKA_SECURITY_PROTOCOL: SASL_PLAINTEXT
      # KAFKA_SASL_MECHANISM: SCRAM-SHA-512
      # KAFKA_SASL_JAAS_CONFIG: org.apache.kafka.common.security.scram.ScramLoginModule required username="admin" password="admin-secret";
    depends_on:
      - redis-auth
      - postgres-auth
      - kafka
    networks:
      - redflag-network

  ff-service:
    build:
      context: ./feature-flag-service
      dockerfile: Dockerfile
    container_name: ff-service
    ports:
      - "8080:8080"
    environment:
      MICRONAUT_ENVIRONMENTS: dev
      DATASOURCES_DEFAULT_URL: jdbc:postgresql://postgres-ff:5432/${FF_SERVICE_DB}
      DATASOURCES_DEFAULT_USERNAME: ${FF_SERVICE_DB_USER}
      DATASOURCES_DEFAULT_PASSWORD: ${FF_SERVICE_DB_PASSWORD}
      MICRONAUT_HTTP_SERVICES_AUTH_SERVICE_URL: http://auth-service:8080
    depends_on:
      - postgres-ff
    networks:
      - redflag-network

volumes:
  ff_service_pgdata:
    name: ff_service_pgdata
  postgres-auth-data:
  redis-data:
  kafka_data:

networks:
  redflag-network:
    driver: bridge