services:
  postgres-ff:
    image: postgres:18-alpine
    container_name: ff-service-postgres
    environment:
      POSTGRES_DB: ${FF_SERVICE_DB}
      POSTGRES_USER: ${FF_SERVICE_DB_USER}
      POSTGRES_PASSWORD: ${FF_SERVICE_DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: UTC+3
    ports:
      - "5432"
    volumes:
      - ff_service_pgdata:/var/lib/postgresql/data/pgdata
    shm_size: "256m"
    restart: unless-stopped

  postgres-auth:
    image: postgres:latest
    container_name: authdatabase
    ports:
      - "5432"
    environment:
      POSTGRES_DB: ${AUTH_SERVICE_DB}
      POSTGRES_USER: ${AUTH_SERVICE_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_SERVICE_DB_PASSWORD}
    volumes:
      - postgres-auth-data:/var/lib/postgresql

  redis-auth:
    image: redis:7-alpine
    container_name: authredis
    ports:
      - "6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  kafka:
    image: apache/kafka:3.7.1
    container_name: kafka
    hostname: kafka
    ports:
      - "9094:9094"
    volumes:
      - kafka_data:/var/lib/kafka/data
      - ./init-kafka.sh:/usr/local/bin/init-kafka.sh
    restart: unless-stopped
    entrypoint: ["/bin/bash", "/usr/local/bin/init-kafka.sh"]
    environment:
      ADMIN_KAFKA_USERNAME: ${ADMIN_KAFKA_USERNAME}
      ADMIN_KAFKA_PASSWORD: ${ADMIN_KAFKA_PASSWORD}
      FF_SERVICE_KAFKA_USERNAME: ${FF_SERVICE_KAFKA_USERNAME}
      FF_SERVICE_KAFKA_PASSWORD: ${FF_SERVICE_KAFKA_PASSWORD}
      BROKER_KAFKA_USERNAME: ${BROKER_KAFKA_USERNAME}
      BROKER_KAFKA_PASSWORD: ${BROKER_KAFKA_PASSWORD}
      KAFKA_INTERNAL_URL: ${KAFKA_INTERNAL_URL}
      KAFKA_EXTERNAL_URL: ${KAFKA_EXTERNAL_URL}

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: auth-kafka-ui
    ports:
      - "8082:8080" #пока оставим для дебага
    depends_on:
      - kafka
    environment:
      - KAFKA_CLUSTERS_0_NAME=RedFlag-Cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=${KAFKA_INTERNAL_URL}
      - KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL=SASL_PLAINTEXT
      - KAFKA_CLUSTERS_0_PROPERTIES_SASL_MECHANISM=SCRAM-SHA-512
      - KAFKA_CLUSTERS_0_PROPERTIES_SASL_JAAS_CONFIG=org.apache.kafka.common.security.scram.ScramLoginModule required username="${ADMIN_KAFKA_USERNAME}" password="${ADMIN_KAFKA_PASSWORD}";


  auth-service:
    image: lissaantipatrova/redflags-auth-service:1.0.4
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      MICRONAUT_ENVIRONMENTS: dev
      DATASOURCES_DEFAULT_URL: jdbc:postgresql://postgres-auth:5432/${AUTH_SERVICE_DB}
      DATASOURCES_DEFAULT_USERNAME: ${AUTH_SERVICE_DB_USER}
      DATASOURCES_DEFAULT_PASSWORD: ${AUTH_SERVICE_DB_PASSWORD}
      REDIS_URI: redis://redis-auth:6379
      MICRONAUT_HTTP_SERVICES_FF_SERVICE_URL: ${FF_SERVICE_URL}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_INTERNAL_URL}
      KAFKA_SECURITY_PROTOCOL: SASL_PLAINTEXT
      KAFKA_SASL_MECHANISM: SCRAM-SHA-512
      KAFKA_SASL_JAAS_CONFIG: org.apache.kafka.common.security.scram.ScramLoginModule required username="${ADMIN_KAFKA_USERNAME}" password="${ADMIN_KAFKA_PASSWORD}";
    depends_on:
      - redis-auth
      - postgres-auth
      - kafka
    labels:
      - "logging=true"

  ff-service:
    image: lissaantipatrova/redflags-feature-flag-service:1.0.6
    container_name: ff-service
    ports:
      - "8080:8080"
    environment:
      MICRONAUT_ENVIRONMENTS: dev
      DATASOURCES_DEFAULT_URL: jdbc:postgresql://postgres-ff:5432/${FF_SERVICE_DB}
      DATASOURCES_DEFAULT_USERNAME: ${FF_SERVICE_DB_USER}
      DATASOURCES_DEFAULT_PASSWORD: ${FF_SERVICE_DB_PASSWORD}
      MICRONAUT_HTTP_SERVICES_AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_INTERNAL_URL}
      KAFKA_SECURITY_PROTOCOL: SASL_PLAINTEXT
      KAFKA_SASL_MECHANISM: SCRAM-SHA-512
      KAFKA_SASL_JAAS_CONFIG: org.apache.kafka.common.security.scram.ScramLoginModule required username="${FF_SERVICE_KAFKA_USERNAME}" password="${FF_SERVICE_KAFKA_PASSWORD}";
    depends_on:
      - postgres-ff
      - kafka
    labels:
      - "logging=true"

  loki:
    image: grafana/loki:latest
    container_name: loki
    command: -config.file=/etc/loki/local-config.yaml

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: [
      "run",
      "--storage.path=/var/lib/alloy/data",
      "--server.http.listen-addr=0.0.0.0:12345",
      "/etc/alloy/config.alloy"
    ]
    depends_on: [ loki ]

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-remote-write-receiver'
#    ports:
#      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on: [ loki ]


  frontend:
    image: dischargedrobo/frontend-workshop:latest
    environment:
      API_FF_SERVICE_URL_V1: ${API_GATEWAY_URL}${PATH_FF_SERVICE_API_V1}
      API_AUT_SERVICE_URL_V1: ${API_GATEWAY_URL}${PATH_AUTH_SERVICE_API_V1}
      API_GATEWAY_URL: ${API_GATEWAY_URL}
    ports:
      - "3000:3000"
    container_name: frontend-ff
    depends_on:
      - auth-service
      - ff-service

  api-gateway:
    image: nginx:latest
    container_name: nginx-api-gateway
    ports:
      - "9090:9090"
    volumes:
      - ./api-gateway-nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ff-service
      - auth-service

volumes:
  ff_service_pgdata:
    name: ff_service_pgdata
  postgres-auth-data:
  redis-data:
  kafka_data:
