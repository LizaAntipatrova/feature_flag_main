services:
  postgres-ff:
    image: postgres:18-alpine
    container_name: ff-service-postgres
    environment:
      POSTGRES_DB: ${FF_SERVICE_DB}
      POSTGRES_USER: ${FF_SERVICE_DB_USER}
      POSTGRES_PASSWORD: ${FF_SERVICE_DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: UTC+3
    ports:
      - "5432:5432"
    volumes:
      - ff_service_pgdata:/var/lib/postgresql/data/pgdata
    shm_size: "256m"
    restart: unless-stopped

  postgres-auth:
    image: postgres:latest
    container_name: authdatabase
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${AUTH_SERVICE_DB}
      POSTGRES_USER: ${AUTH_SERVICE_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_SERVICE_DB_PASSWORD}
    volumes:
      - postgres-auth-data:/var/lib/postgresql

volumes:
  ff_service_pgdata:
    name: ff_service_pgdata
  postgres-auth-data:




