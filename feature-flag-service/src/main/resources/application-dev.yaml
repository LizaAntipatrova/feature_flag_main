micronaut:
  server:
    cors:
      configurations:
        web:
          allowedOrigins:
            - http://localhost:3000
  http:
    services:
      auth-service:
        url: http://localhost:8081
        read-timeout: 2s
        connect-timeout: 1s
  security:
    enabled: true
    authentication: cookie
    intercept-url-map:
      - pattern: /swagger-ui/**
        access: isAnonymous()
      - pattern: /swagger/**
        access: isAnonymous()
      - pattern: /api/v1/**
        access: isAuthenticated()

datasources:
  default:
    url: jdbc:postgresql://localhost:5432/ff-service
    username: ${FF_SERVICE_DB_USER}
    password: ${FF_SERVICE_DB_PASSWORD}
jpa:
  default:
    properties:
      hibernate:
        show_sql: true