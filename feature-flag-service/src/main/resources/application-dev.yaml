micronaut:
  server:
    cors:
      configurations:
        web:
          allowedOrigins:
            - http://localhost:3000
            - http://127.0.0.1:3000
  http:
    services:
      auth-service:
        url: http://localhost:8081
        read-timeout: 2s
        connect-timeout: 1s
  security:
    enabled: true
    authentication: bearer
    redirect:
      enabled: false

    token:
      jwt:
        enabled: true
        cookie:
          enabled: false
        signatures:
          secret:
            generator:
              secret: '${JWT_GENERATOR_SIGNATURE_SECRET:pleaseChangeThisSecretForProduction}'
        bearer:
          enabled: true

    endpoints:
      login:
        enabled: false
      logout:
        enabled: false
      prometheus:
        enabled: true
        sensitive: false

    session:
      enabled: false

    intercept-url-map:
      - pattern: /swagger-ui/**
        access: isAnonymous()
      - pattern: /swagger/**
        access: isAnonymous()
      - pattern: /api/v1/**
        access: isAuthenticated()

      - pattern: /prometheus
        access: isAnonymous()

  aot:
    replaceLogbackXml: false
  metrics:
    enabled: true
    export:
      prometheus:
        enabled: true
        step: PT1M

datasources:
  default:
    url: jdbc:postgresql://localhost:5432/ff-service
    username: ${FF_SERVICE_DB_USER}
    password: ${FF_SERVICE_DB_PASSWORD}
jpa:
  default:
    properties:
      hibernate:
        show_sql: true

kafka:
  bootstrap:
    servers: localhost:9094
  security:
    protocol: SASL_PLAINTEXT
  sasl:
    mechanism: SCRAM-SHA-512
    jaas:
      config: 'org.apache.kafka.common.security.scram.ScramLoginModule required username="${KAFKA_USERNAME:main_service}" password="${KAFKA_PASSWORD:main-secret}";'
  producers:
    default:
      key:
        serializer: org.apache.kafka.common.serialization.StringSerializer
      value:
        serializer: org.apache.kafka.common.serialization.StringSerializer
endpoints:
  health:
    kafka:
      enabled: false
  all:
    port: 8084

logger:
  config: logback-json.xml
